<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CoBuilders — Fork Management</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface2: #1e1e1e;
      --border: #2a2a2a;
      --text: #e5e5e5;
      --text2: #999;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --green: #22c55e;
      --orange: #f59e0b;
      --red: #ef4444;
      --red-hover: #dc2626;
      --mono: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      padding: 2rem 1rem;
    }
    .container { max-width: 960px; margin: 0 auto; }

    /* Header */
    .header { margin-bottom: 2rem; }
    .header h1 { font-size: 2rem; font-weight: 700; margin-bottom: 0.25rem; }
    .header h1 span { color: var(--accent); }
    .header p { color: var(--text2); font-size: 1rem; }

    /* Toolbar */
    .toolbar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1.5rem; flex-wrap: wrap; gap: 0.75rem;
    }
    .toolbar h2 { font-size: 1.1rem; font-weight: 600; }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 0.4rem; padding: 0.55rem 1.1rem; border: none; border-radius: 8px;
      font-size: 0.9rem; font-weight: 600; cursor: pointer;
      transition: background 0.15s, opacity 0.15s, transform 0.1s;
      text-decoration: none; white-space: nowrap;
    }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
    .btn-danger { background: var(--red); color: #fff; }
    .btn-danger:hover:not(:disabled) { background: var(--red-hover); }
    .btn-ghost {
      background: transparent; color: var(--text2);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
    .btn-sm { padding: 0.35rem 0.75rem; font-size: 0.8rem; }

    /* Fork list */
    #forkList { display: flex; flex-direction: column; gap: 1rem; }

    /* Fork card */
    .fork-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      transition: border-color 0.2s, opacity 0.3s;
      position: relative;
    }
    .fork-card.deleting { opacity: 0.5; pointer-events: none; }
    .fork-card:hover { border-color: #3a3a3a; }

    .fork-card-header {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 1rem; margin-bottom: 0.75rem;
      flex-wrap: wrap;
    }
    .fork-name-link {
      font-size: 1.1rem; font-weight: 700; color: var(--accent);
      text-decoration: none; display: flex; align-items: center; gap: 0.35rem;
    }
    .fork-name-link:hover { text-decoration: underline; }
    .fork-name-link svg { width: 14px; height: 14px; opacity: 0.7; flex-shrink: 0; }

    .fork-meta {
      display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center;
    }
    .badge {
      display: inline-flex; align-items: center; gap: 0.3rem;
      font-size: 0.72rem; font-weight: 600; padding: 0.2rem 0.55rem;
      border-radius: 999px; letter-spacing: 0.03em;
    }
    .badge-green { background: rgba(34,197,94,0.12); color: var(--green); }
    .badge-blue  { background: rgba(59,130,246,0.12); color: var(--accent); }
    .badge-orange{ background: rgba(245,158,11,0.12); color: var(--orange); }

    /* RPC row */
    .rpc-row {
      display: flex; align-items: center; gap: 0.5rem;
      background: var(--surface2); border-radius: 8px;
      padding: 0.55rem 0.85rem; margin-bottom: 0.75rem; flex-wrap: wrap;
    }
    .rpc-label {
      font-size: 0.72rem; color: var(--text2); text-transform: uppercase;
      letter-spacing: 0.05em; white-space: nowrap;
    }
    .rpc-url {
      font-family: var(--mono); font-size: 0.82rem;
      color: var(--text); flex: 1; word-break: break-all;
    }
    .copy-btn {
      background: none; border: 1px solid var(--border); color: var(--text2);
      border-radius: 5px; padding: 0.2rem 0.5rem; cursor: pointer;
      font-size: 0.75rem; font-family: inherit; transition: all 0.2s;
      display: inline-flex; align-items: center; gap: 0.25rem; white-space: nowrap;
      flex-shrink: 0;
    }
    .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
    .copy-btn.copied { border-color: var(--green); color: var(--green); }
    .copy-btn svg { width: 13px; height: 13px; }

    /* Fork card footer (actions) */
    .fork-card-footer {
      display: flex; align-items: center; gap: 0.5rem;
      flex-wrap: wrap; justify-content: flex-end; margin-top: 0.25rem;
    }

    /* Info pills */
    .fork-info {
      display: flex; gap: 0.75rem; flex-wrap: wrap;
      font-size: 0.8rem; color: var(--text2); margin-bottom: 0.75rem;
    }
    .fork-info span { display: flex; align-items: center; gap: 0.3rem; }

    /* Empty / loading / error state */
    .state-box {
      text-align: center; padding: 3rem 1rem;
      color: var(--text2); font-size: 0.95rem;
    }
    .state-box .icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
    .spinner {
      width: 20px; height: 20px; border: 2px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.7s linear infinite; display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Delete spinner on card */
    .card-spinner {
      position: absolute; top: 1rem; right: 1rem;
      width: 18px; height: 18px; border: 2px solid var(--border);
      border-top-color: var(--red); border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    /* Modal */
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75);
      z-index: 200; align-items: center; justify-content: center; padding: 1rem;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 2rem; max-width: 430px; width: 100%;
    }
    .modal-icon { font-size: 2rem; margin-bottom: 0.5rem; }
    .modal h3 { font-size: 1.2rem; margin-bottom: 0.5rem; }
    .modal p { color: var(--text2); font-size: 0.9rem; margin-bottom: 1.5rem; line-height: 1.6; }
    .modal p strong { color: var(--text); }
    .modal-actions { display: flex; gap: 0.75rem; justify-content: flex-end; }

    /* Toast container */
    #toastContainer {
      position: fixed; bottom: 1.5rem; right: 1.5rem;
      display: flex; flex-direction: column; gap: 0.6rem;
      z-index: 500; pointer-events: none;
    }
    .toast {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 0.75rem 1.1rem;
      font-size: 0.875rem; max-width: 320px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
      display: flex; align-items: center; gap: 0.6rem;
      animation: slideIn 0.25s ease;
      pointer-events: auto;
    }
    .toast.success { border-left: 3px solid var(--green); }
    .toast.error   { border-left: 3px solid var(--red); }
    .toast.info    { border-left: 3px solid var(--accent); }
    @keyframes slideIn {
      from { transform: translateX(110%); opacity: 0; }
      to   { transform: translateX(0);    opacity: 1; }
    }
    @keyframes slideOut {
      from { transform: translateX(0);    opacity: 1; }
      to   { transform: translateX(110%); opacity: 0; }
    }
    .toast.removing { animation: slideOut 0.25s ease forwards; }

    /* Footer */
    .footer {
      text-align: center; color: var(--text2); font-size: 0.8rem;
      margin-top: 3rem; padding-top: 1.5rem; border-top: 1px solid var(--border);
    }
    .footer a { color: var(--accent); text-decoration: none; }

    @media (max-width: 600px) {
      .fork-card-header { flex-direction: column; }
      .modal-actions { flex-direction: column-reverse; }
      .modal-actions .btn { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- Header -->
    <div class="header">
      <h1>⛓️ <span>CoBuilders</span> — Fork Management</h1>
      <p>Create and manage Anvil fork instances for development & testing.</p>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <h2 id="forkCount">Forks</h2>
      <button class="btn btn-primary" onclick="openCreateFork()">
        <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16">
          <path d="M10 5a1 1 0 011 1v3h3a1 1 0 110 2h-3v3a1 1 0 11-2 0v-3H6a1 1 0 110-2h3V6a1 1 0 011-1z"/>
        </svg>
        New Fork
      </button>
    </div>

    <!-- Fork List -->
    <div id="forkList">
      <div class="state-box">
        <div class="icon"><span class="spinner"></span></div>
        <div>Loading forks…</div>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <p>CoBuilders Fork Management — <a href="https://github.com/CoBuilders-xyz/cobuilders-devnet">GitHub</a> · Built by <a href="https://cobuilders.xyz">CoBuilders</a></p>
    </div>

  </div><!-- /container -->

  <!-- Delete Confirmation Modal -->
  <div class="modal-overlay" id="deleteModal" role="dialog" aria-modal="true" aria-labelledby="deleteModalTitle">
    <div class="modal">
      <div class="modal-icon">🗑️</div>
      <h3 id="deleteModalTitle">Delete Fork</h3>
      <p id="deleteModalBody"></p>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="cancelDeleteBtn" onclick="cancelDelete()">Cancel</button>
        <button class="btn btn-danger" id="confirmDeleteBtn" onclick="confirmDelete()">Delete</button>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toastContainer" aria-live="polite"></div>

  <script>
    // ─── State ───────────────────────────────────────────────────────────────
    let forks = [];
    let deleteDialog = { isOpen: false, forkId: null, forkName: '', isDeleting: false };

    // ─── Bootstrap ───────────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
      loadForks();
    });

    // ─── API helpers ─────────────────────────────────────────────────────────
    async function apiFetch(path, options = {}) {
      const res = await fetch(path, {
        headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
        ...options,
      });
      if (!res.ok) {
        let msg = `HTTP ${res.status}`;
        try { const data = await res.json(); msg = data.error || data.message || msg; } catch {}
        throw new Error(msg);
      }
      // 204 No Content
      if (res.status === 204) return null;
      return res.json();
    }

    // ─── Load forks ──────────────────────────────────────────────────────────
    async function loadForks() {
      setListState('loading');
      try {
        const data = await apiFetch('/api/forks');
        forks = Array.isArray(data) ? data : (data.forks || []);
        renderForks();
      } catch (err) {
        setListState('error', err.message);
      }
    }

    // ─── Render ──────────────────────────────────────────────────────────────
    function renderForks() {
      const list = document.getElementById('forkList');
      const countEl = document.getElementById('forkCount');
      countEl.textContent = `Forks (${forks.length})`;

      if (forks.length === 0) {
        setListState('empty');
        return;
      }

      list.innerHTML = forks.map(fork => buildForkCard(fork)).join('');
    }

    function buildForkCard(fork) {
      const rpcUrl = fork.rpcUrl || fork.rpc_url || '';
      const dashboardUrl = fork.dashboardUrl || fork.dashboard_url || '';
      const name = fork.name || fork.id || 'Unnamed Fork';
      const chain = fork.chain || fork.network || '';
      const status = fork.status || 'running';
      const createdAt = fork.createdAt || fork.created_at || '';

      const statusBadge = status === 'running'
        ? `<span class="badge badge-green">● Running</span>`
        : status === 'pending'
        ? `<span class="badge badge-orange">◐ Pending</span>`
        : `<span class="badge badge-blue">${status}</span>`;

      const chainBadge = chain
        ? `<span class="badge badge-blue">${escapeHtml(chain)}</span>`
        : '';

      const createdStr = createdAt
        ? `<span title="${escapeHtml(createdAt)}">📅 ${formatDate(createdAt)}</span>`
        : '';

      const dashboardLink = dashboardUrl
        ? `<a class="fork-name-link" href="${escapeHtml(dashboardUrl)}" target="_blank" rel="noopener noreferrer">
             ${escapeHtml(name)}
             <svg viewBox="0 0 20 20" fill="currentColor"><path d="M11 3a1 1 0 100 2h2.586l-6.293 6.293a1 1 0 101.414 1.414L15 6.414V9a1 1 0 102 0V4a1 1 0 00-1-1h-5z"/><path d="M5 5a2 2 0 00-2 2v8a2 2 0 002 2h8a2 2 0 002-2v-3a1 1 0 10-2 0v3H5V7h3a1 1 0 000-2H5z"/></svg>
           </a>`
        : `<span class="fork-name-link" style="color:var(--text);cursor:default">${escapeHtml(name)}</span>`;

      const rpcRow = rpcUrl ? `
        <div class="rpc-row">
          <span class="rpc-label">RPC</span>
          <span class="rpc-url">${escapeHtml(rpcUrl)}</span>
          <button
            class="copy-btn"
            onclick="copyRpc(event, '${escapeAttr(rpcUrl)}')"
            aria-label="Copy RPC endpoint"
            title="Copy RPC endpoint"
          >
            <svg viewBox="0 0 20 20" fill="currentColor">
              <path d="M8 3a1 1 0 011-1h2a1 1 0 110 2H9a1 1 0 01-1-1z"/>
              <path d="M6 3a2 2 0 00-2 2v11a2 2 0 002 2h8a2 2 0 002-2V5a2 2 0 00-2-2 3 3 0 01-3 3H9a3 3 0 01-3-3z"/>
            </svg>
            Copy
          </button>
        </div>` : '';

      const dashboardUrlRow = (dashboardUrl && dashboardUrl !== name) ? `
        <div class="fork-info">
          <span>🌐
            <a href="${escapeHtml(dashboardUrl)}" target="_blank" rel="noopener noreferrer"
               style="color:var(--accent);font-size:0.8rem;">${escapeHtml(dashboardUrl)}</a>
          </span>
        </div>` : '';

      return `
        <div class="fork-card" id="fork-card-${escapeAttr(fork.id)}" data-fork-id="${escapeAttr(fork.id)}">
          <div class="fork-card-header">
            <div>
              ${dashboardLink}
              <div class="fork-meta" style="margin-top:0.4rem">
                ${statusBadge}
                ${chainBadge}
              </div>
            </div>
          </div>
          <div class="fork-info">
            ${fork.id ? `<span>🔑 <code style="font-family:var(--mono);font-size:0.78rem">${escapeHtml(fork.id)}</code></span>` : ''}
            ${createdStr}
          </div>
          ${rpcRow}
          ${dashboardUrlRow}
          <div class="fork-card-footer">
            <button
              class="btn btn-ghost btn-sm"
              onclick="openDeleteDialog('${escapeAttr(fork.id)}', '${escapeAttr(name)}')"
              aria-label="Delete fork ${escapeAttr(name)}"
            >
              <svg viewBox="0 0 20 20" fill="currentColor" width="14" height="14">
                <path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"/>
              </svg>
              Delete
            </button>
          </div>
        </div>`;
    }

    function setListState(state, message) {
      const list = document.getElementById('forkList');
      const countEl = document.getElementById('forkCount');
      if (state === 'loading') {
        list.innerHTML = `<div class="state-box"><div class="icon"><span class="spinner"></span></div><div>Loading forks…</div></div>`;
        countEl.textContent = 'Forks';
      } else if (state === 'empty') {
        list.innerHTML = `<div class="state-box"><div class="icon">🌿</div><div>No forks yet. Create one to get started.</div></div>`;
        countEl.textContent = 'Forks (0)';
      } else if (state === 'error') {
        list.innerHTML = `<div class="state-box"><div class="icon">⚠️</div><div style="color:var(--red)">Failed to load forks: ${escapeHtml(message || 'Unknown error')}</div><br><button class="btn btn-ghost btn-sm" onclick="loadForks()">Retry</button></div>`;
        countEl.textContent = 'Forks';
      }
    }

    // ─── Copy RPC ─────────────────────────────────────────────────────────────
    // REQ-MDU-003: Copy RPC endpoint to clipboard
    async function copyRpc(event, url) {
      const btn = event.currentTarget;
      try {
        await navigator.clipboard.writeText(url);
        // AC-MDU-003.3: visual confirmation for 2 seconds
        btn.classList.add('copied');
        btn.innerHTML = `
          <svg viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/>
          </svg>
          Copied!`;
        setTimeout(() => {
          btn.classList.remove('copied');
          btn.innerHTML = `
            <svg viewBox="0 0 20 20" fill="currentColor">
              <path d="M8 3a1 1 0 011-1h2a1 1 0 110 2H9a1 1 0 01-1-1z"/>
              <path d="M6 3a2 2 0 00-2 2v11a2 2 0 002 2h8a2 2 0 002-2V5a2 2 0 00-2-2 3 3 0 01-3 3H9a3 3 0 01-3-3z"/>
            </svg>
            Copy`;
        }, 2000);
      } catch {
        // AC-MDU-003.4: clipboard error
        showToast('Unable to copy. Please copy manually.', 'error');
      }
    }

    // ─── Delete flow ──────────────────────────────────────────────────────────
    // REQ-MDU-004: Delete Fork

    // AC-MDU-004.1 / 004.2: Show confirmation dialog
    function openDeleteDialog(forkId, forkName) {
      deleteDialog = { isOpen: true, forkId, forkName, isDeleting: false };
      document.getElementById('deleteModalBody').innerHTML =
        `Are you sure you want to delete fork <strong>${escapeHtml(forkName)}</strong>? All blockchain state will be permanently lost.`;
      document.getElementById('confirmDeleteBtn').disabled = false;
      document.getElementById('cancelDeleteBtn').disabled = false;
      document.getElementById('deleteModal').classList.add('active');
    }

    // AC-MDU-004.7: Cancel closes dialog
    function cancelDelete() {
      deleteDialog = { isOpen: false, forkId: null, forkName: '', isDeleting: false };
      document.getElementById('deleteModal').classList.remove('active');
    }

    // AC-MDU-004.4 / 004.5 / 004.6: Confirm deletion
    async function confirmDelete() {
      if (deleteDialog.isDeleting) return;
      deleteDialog.isDeleting = true;

      const { forkId, forkName } = deleteDialog;

      // AC-MDU-004.3: disable buttons in dialog
      document.getElementById('confirmDeleteBtn').disabled = true;
      document.getElementById('cancelDeleteBtn').disabled = true;

      // Close dialog
      document.getElementById('deleteModal').classList.remove('active');

      // AC-MDU-004.4: Show loading indicator on the fork card
      const card = document.getElementById(`fork-card-${forkId}`);
      if (card) {
        card.classList.add('deleting');
        const spinner = document.createElement('div');
        spinner.className = 'card-spinner';
        card.appendChild(spinner);
      }

      try {
        await apiFetch(`/api/forks/${encodeURIComponent(forkId)}`, { method: 'DELETE' });

        // AC-MDU-004.5: Remove from list immediately + success toast
        forks = forks.filter(f => f.id !== forkId);
        renderForks();
        showToast(`Fork '${forkName}' deleted`, 'success');
      } catch (err) {
        // AC-MDU-004.6: Keep in list, show error
        if (card) {
          card.classList.remove('deleting');
          const spinner = card.querySelector('.card-spinner');
          if (spinner) spinner.remove();
        }
        showToast(`Failed to delete fork: ${err.message}`, 'error');
      }

      deleteDialog.isDeleting = false;
    }

    // ─── Toast notifications ─────────────────────────────────────────────────
    function showToast(message, type = 'info') {
      const container = document.getElementById('toastContainer');
      const icons = { success: '✅', error: '❌', info: 'ℹ️' };
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.innerHTML = `<span>${icons[type] || ''}</span><span>${escapeHtml(message)}</span>`;
      container.appendChild(toast);
      // Auto-remove after 4s
      setTimeout(() => {
        toast.classList.add('removing');
        toast.addEventListener('animationend', () => toast.remove(), { once: true });
      }, 4000);
    }

    // ─── Create fork (placeholder — WO-4) ────────────────────────────────────
    function openCreateFork() {
      // Navigate to or show create fork UI (implemented in WO-4)
      window.location.href = '/management.html#create';
    }

    // ─── Utilities ───────────────────────────────────────────────────────────
    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#x27;');
    }
    // For HTML attribute values inside onclick="..."
    function escapeAttr(str) {
      return String(str)
        .replace(/\\/g, '\\\\')
        .replace(/'/g, "\\'")
        .replace(/"/g, '&quot;');
    }
    function formatDate(iso) {
      try {
        return new Intl.DateTimeFormat(undefined, {
          year: 'numeric', month: 'short', day: 'numeric',
          hour: '2-digit', minute: '2-digit',
        }).format(new Date(iso));
      } catch { return iso; }
    }

    // Close modal when clicking outside
    document.getElementById('deleteModal').addEventListener('click', function(e) {
      if (e.target === this && !deleteDialog.isDeleting) cancelDelete();
    });

    // Close modal on Escape
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && deleteDialog.isOpen && !deleteDialog.isDeleting) cancelDelete();
    });
  </script>
</body>
</html>
